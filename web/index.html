<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能翻译工具 - 长文本流式翻译</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🌐</span>
        <h1>智能翻译工具</h1>
      </div>
      <div class="header-actions">
        <button id="btnHistory" class="btn btn-secondary">
          <span>📋</span> 历史记录
        </button>
        <div id="connectionStatus" class="connection-status online">
          <span class="status-dot"></span>
          <span class="status-text">已连接</span>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="controls-bar">
        <div class="lang-selector">
          <label>源语言</label>
          <select id="sourceLang" class="select">
            <option value="auto">自动检测</option>
            <option value="zh">中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
          </select>
        </div>

        <button id="btnSwap" class="btn btn-icon" title="交换语言">
          ⇄
        </button>

        <div class="lang-selector">
          <label>目标语言</label>
          <select id="targetLang" class="select">
            <option value="zh">中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
          </select>
        </div>

        <div class="spacer"></div>

        <div class="char-count">
          <span id="charCount">0</span> 字符
        </div>
      </div>

      <div class="translation-area">
        <div class="source-panel">
          <div class="panel-header">
            <span class="panel-title">原文</span>
            <button id="btnClear" class="btn btn-small btn-ghost">清空</button>
          </div>
          <textarea 
            id="sourceText" 
            class="textarea" 
            placeholder="在此输入要翻译的文本...&#10;&#10;支持长文本流式翻译，逐句显示结果&#10;支持万字级文本分段处理"
          ></textarea>
          <div class="panel-footer">
            <div class="detected-lang" id="detectedLang"></div>
            <button id="btnTranslate" class="btn btn-primary">
              <span id="btnTranslateText">开始翻译</span>
            </button>
          </div>
        </div>

        <div class="result-panel">
          <div class="panel-header">
            <span class="panel-title">译文</span>
            <div class="panel-actions">
              <button id="btnCopy" class="btn btn-small btn-ghost" disabled>复制</button>
              <button id="btnStop" class="btn btn-small btn-ghost" style="display:none;">停止</button>
            </div>
          </div>
          <div class="result-container" id="resultContainer">
            <div class="result-placeholder" id="resultPlaceholder">
              <div class="placeholder-icon">📝</div>
              <p>翻译结果将显示在这里</p>
              <p class="hint">流式翻译，逐句呈现</p>
            </div>
            <div class="result-content" id="resultContent" style="display:none;"></div>
          </div>
          <div class="progress-bar-container" id="progressContainer" style="display:none;">
            <div class="progress-bar" id="progressBar"></div>
            <span class="progress-text" id="progressText">0%</span>
          </div>
          <div class="panel-footer">
            <div class="translation-info" id="translationInfo"></div>
          </div>
        </div>
      </div>

      <div class="warnings-container" id="warningsContainer" style="display:none;"></div>
    </main>
  </div>

  <div class="modal-overlay" id="historyModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>历史记录</h2>
        <button class="btn btn-icon btn-close" id="btnCloseHistory">×</button>
      </div>
      <div class="modal-body">
        <div class="history-search">
          <input 
            type="text" 
            id="historySearch" 
            class="input" 
            placeholder="搜索历史记录..."
          >
          <button id="btnClearHistory" class="btn btn-ghost btn-small">清空</button>
        </div>
        <div class="history-list" id="historyList">
        </div>
        <div class="pagination" id="pagination">
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/storage.js"></script>
  <script src="js/translator.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
